name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ============================================================
  # JOB 1 — Lint, tests y build de TypeScript
  # ============================================================
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci --include=dev --ignore-scripts

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Tests unitarios
        run: npm test -- --no-coverage

      - name: Build TypeScript
        run: npm run build

      - name: Verificar artefacto de build
        run: |
          if [ ! -f dist/src/main.js ]; then
            echo "::error::dist/src/main.js no se generó"
            exit 1
          fi
          echo "✅ Build exitoso — dist/src/main.js existe"

  # ============================================================
  # JOB 2 — Build de Docker image (solo en push a main)
  # ============================================================
  docker:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (sin push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: petfinder-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verificar que la imagen arranca
        run: |
          docker run --rm -d \
            --name petfinder-test \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e DATABASE_URL=postgresql://fake:fake@localhost:5432/fake \
            -e DIRECT_URL=postgresql://fake:fake@localhost:5432/fake \
            -e JWT_SECRET=test_secret_minimo_de_32_caracteres_para_pasar_validacion \
            -e CLOUDINARY_CLOUD_NAME=fake \
            -e CLOUDINARY_API_KEY=fake \
            -e CLOUDINARY_API_SECRET=fake \
            petfinder-backend:latest

          # Esperamos 10s y verificamos que el contenedor sigue vivo
          sleep 10

          if [ "$(docker inspect -f '{{.State.Running}}' petfinder-test 2>/dev/null)" = "true" ]; then
            echo "✅ Imagen Docker arranca correctamente"
            docker stop petfinder-test
          else
            echo "::error::❌ Imagen Docker fallรณ al arrancar"
            docker logs petfinder-test
            exit 1
          fi
