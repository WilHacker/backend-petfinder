services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petfinder-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/docs"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
